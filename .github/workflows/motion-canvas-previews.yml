name: Motion Canvas previews

on:
  pull_request:
    paths:
      - 'src/projects/**'
      - 'src/scenes/**'
      - 'src/videos/**'
      - 'scripts/generate-video-screenshots.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/motion-canvas-previews.yml'

jobs:
  build-and-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Motion Canvas projects
        run: npm run build

      - name: Detect changed video folders
        id: videos
        shell: bash
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          changed_files="$(git diff --name-only "$base_sha" HEAD)"
          videos="$(printf '%s\n' "$changed_files" | awk -F/ '/^src\/videos\/[^/]+\// {print $3}' | sort -u | tr '\n' ' ')"

          if [ -z "$videos" ] && printf '%s\n' "$changed_files" | grep -Eq '^src/(projects|scenes)/'; then
            videos="$(find src/videos -mindepth 1 -maxdepth 1 -type d -printf '%f ' 2>/dev/null || true)"
          fi

          echo "videos=$videos" >> "$GITHUB_OUTPUT"

      - name: Generate screenshot previews
        if: steps.videos.outputs.videos != ''
        run: node scripts/generate-video-screenshots.mjs ${{ steps.videos.outputs.videos }}

      - name: Upload screenshot previews
        if: steps.videos.outputs.videos != ''
        uses: actions/upload-artifact@v6
        with:
          name: motion-canvas-screenshots
          path: artifacts/screenshots
          if-no-files-found: error
